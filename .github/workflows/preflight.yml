# CI preflight gate for go-stt.
# Public repo -> free GitHub-hosted arm64 runner (prod-box parity).
# Gate = `make preflight` (gofmt + vet + build + race tests).
name: preflight

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: make preflight
