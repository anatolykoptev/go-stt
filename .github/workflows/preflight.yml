# CI preflight gate for go-stt.
# Public repo -> free GitHub-hosted arm64 runner (prod-box parity).
# Gate = `make preflight` (gofmt + vet + errcheck + staticcheck + build + race tests).
#
# Follow-up (not blocking): WebSocket protocol conformance via the Autobahn
# Test Suite (https://github.com/crossbario/autobahn-testsuite) — needs a
# docker/autobahn environment, not wired here.
name: preflight

on: [push, pull_request]

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: make preflight
